<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PocketWise – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2235;
  --border:#1e2d42;--accent:#22d3ee;--accent2:#818cf8;
  --green:#4ade80;--red:#f87171;--yellow:#fbbf24;
  --text:#f1f5f9;--muted:#64748b;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* animated bg */
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:50px 50px;opacity:.4;}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;}
.orb1{width:500px;height:500px;background:radial-gradient(circle,rgba(34,211,238,.15),transparent);top:-100px;right:-100px;animation:drift 8s ease-in-out infinite alternate;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,rgba(129,140,248,.12),transparent);bottom:-100px;left:-100px;animation:drift 10s ease-in-out infinite alternate-reverse;}
@keyframes drift{from{transform:translate(0,0);}to{transform:translate(30px,20px);}}

.card{position:relative;z-index:10;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:420px;max-width:95vw;}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;}
.logo-text span{color:var(--accent);}

.tabs{display:flex;background:var(--surface2);border-radius:10px;padding:4px;margin-bottom:32px;}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 8px rgba(0,0,0,.4);}

.form-group{margin-bottom:16px;}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
input:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}

.btn{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0a0e1a;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s,transform .1s;letter-spacing:.3px;}
.btn:hover{opacity:.9;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;}

.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}

.tagline{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px;}
.tagline strong{color:var(--accent);}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-text">Pocket<span>Wise</span></div>
  </div>
  <p class="tagline">Track every rupee. <strong>Own your finances.</strong></p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div id="error-msg" class="error"></div>
  <div id="success-msg" class="success"></div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Enter your password"/>
    </div>
    <button class="btn" id="login-btn" onclick="login()">Sign In →</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="Yashika Sharma"/>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="At least 6 characters"/>
    </div>
    <button class="btn" id="reg-btn" onclick="register()">Create Account →</button>
  </div>
</div>

<script>
const API = 'https://pocketwise-production.up.railway.app/api';

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  clearMessages();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}
function clearMessages() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

async function login() {
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showError('Please fill in all fields.');

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  clearMessages();

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }

    localStorage.setItem('pw_token', data.token);
    localStorage.setItem('pw_user',  JSON.stringify(data.user));
    showSuccess('Welcome back! Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 800);
  } catch {
    showError('Cannot connect to server. Is the backend running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In →';
  }
}

async function register() {
  const name     = document.getElementById('reg-name').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!name || !email || !password) return showError('Please fill in all fields.');

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  clearMessages();

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ name, email, password })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); return; }

    localStorage.setItem('pw_token', data.token);
    localStorage.setItem('pw_user',  JSON.stringify(data.user));
    showSuccess('Account created! 10 default categories added. Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } catch {
    showError('Cannot connect to server. Is the backend running?');
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account →';
  }
}

// Redirect if already logged in
if (localStorage.getItem('pw_token')) window.location.href = 'dashboard.html';

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const loginVisible = document.getElementById('login-form').style.display !== 'none';
    loginVisible ? login() : register();
  }
});
</script>
</body>
</html>
