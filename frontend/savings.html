<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PocketWise – Savings Goals</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --surface3: #1e2d42;
            --border: #1e2d42;
            --accent: #22d3ee;
            --accent2: #818cf8;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --orange: #fb923c;
            --text: #f1f5f9;
            --muted: #64748b;
            --muted2: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -.3px;
        }

        .logo-text span {
            color: var(--accent);
        }

        nav {
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            color: var(--muted2);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all .2s;
            cursor: pointer;
        }

        .nav-link:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link.active {
            background: rgba(34, 211, 238, .1);
            color: var(--accent);
        }

        .nav-link .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .user-pill {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #0a0e1a;
            flex-shrink: 0;
        }

        .user-info {
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            margin-top: 2px;
            text-align: left;
        }

        .logout-btn:hover {
            color: var(--red);
        }

        .main {
            margin-left: 220px;
            padding: 32px;
            flex: 1;
            max-width: calc(100vw - 220px);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Summary */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
        }

        .stat-value.accent {
            color: var(--accent);
        }

        .stat-value.green {
            color: var(--green);
        }

        .stat-value.yellow {
            color: var(--yellow);
        }

        /* Goals grid */
        .goals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .goal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
        }

        .goal-card.completed {
            border-color: var(--green);
            background: rgba(74, 222, 128, .04);
        }

        .goal-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .goal-card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .goal-card-date {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .completed-badge {
            background: rgba(74, 222, 128, .15);
            color: var(--green);
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 99px;
        }

        .goal-amounts {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .goal-amounts .saved {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--accent);
        }

        .goal-amounts .target {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        .bar-wrap {
            height: 8px;
            background: var(--surface3);
            border-radius: 99px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 99px;
            transition: width .6s ease;
        }

        .bar-fill.done {
            background: linear-gradient(90deg, var(--green), #86efac);
        }

        .goal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .goal-pct {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--accent);
        }

        .goal-actions {
            display: flex;
            gap: 8px;
        }

        .btn-contribute {
            background: rgba(34, 211, 238, .1);
            color: var(--accent);
            border: 1px solid rgba(34, 211, 238, .2);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-contribute:hover {
            background: rgba(34, 211, 238, .2);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            padding: 6px 8px;
            border-radius: 6px;
        }

        .delete-btn:hover {
            color: var(--red);
            background: rgba(248, 113, 113, .1);
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            padding: 40px 0;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 460px;
            max-width: 95vw;
        }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted2);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-confirm {
            flex: 2;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0e1a;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <div class="logo-text">Pocket<span>Wise</span></div>
            </div>
            <nav>
                <a class="nav-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
                <a class="nav-link" href="dashboard.html"><span class="icon">➕</span> Add Transaction</a>
                <a class="nav-link" href="budgets.html"><span class="icon">🎯</span> Budgets</a>
                <a class="nav-link active" href="savings.html"><span class="icon">💎</span> Savings Goals</a>
            </nav>
            <div class="user-pill">
                <div class="avatar" id="user-avatar">?</div>
                <div class="user-info">
                    <div class="user-name" id="sidebar-name">Loading...</div>
                    <button class="logout-btn" onclick="logout()">Sign out</button>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <div class="page-title">Savings Goals</div>
                <button class="btn-primary" onclick="openModal('goal')">+ New Goal</button>
            </div>

            <!-- Summary -->
            <div class="summary-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Goals</div>
                    <div class="stat-value accent" id="total-goals">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Completed</div>
                    <div class="stat-value green" id="completed-goals">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Saved</div>
                    <div class="stat-value yellow" id="total-saved">₹0</div>
                </div>
            </div>

            <!-- Goals -->
            <div id="goals-container">
                <div class="panel">
                    <div class="empty">No savings goals yet</div>
                </div>
            </div>
        </main>
    </div>

    <!-- New Goal Modal -->
    <div class="modal-overlay" id="modal-goal">
        <div class="modal">
            <div class="modal-title">New Savings Goal</div>
            <div class="form-group">
                <label>Goal Name</label>
                <input type="text" id="goal-name" placeholder="e.g. New Laptop" />
            </div>
            <div class="form-group">
                <label>Target Amount (₹)</label>
                <input type="number" id="goal-target" placeholder="50000" min="0" />
            </div>
            <div class="form-group">
                <label>Current Savings (₹)</label>
                <input type="number" id="goal-current" placeholder="0" min="0" />
            </div>
            <div class="form-group">
                <label>Target Date</label>
                <input type="date" id="goal-date" />
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal('goal')">Cancel</button>
                <button class="btn-confirm" onclick="addGoal()">Create Goal</button>
            </div>
        </div>
    </div>

    <!-- Contribute Modal -->
    <div class="modal-overlay" id="modal-contribute">
        <div class="modal">
            <div class="modal-title">Add Money</div>
            <div class="form-group">
                <label>Amount to Add (₹)</label>
                <input type="number" id="contribute-amount" placeholder="0" min="0" />
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal('contribute')">Cancel</button>
                <button class="btn-confirm" onclick="contribute()">Add Money</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://pocketwise-production.up.railway.app/api';
        const token = localStorage.getItem('pw_token');
        const user = JSON.parse(localStorage.getItem('pw_user') || '{}');
        if (!token) window.location.href = 'index.html';

        document.getElementById('sidebar-name').textContent = user.name || 'User';
        document.getElementById('user-avatar').textContent = (user.name || 'U')[0].toUpperCase();

        let activeGoalId = null;

        function fmt(n) { return '₹' + parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 0 }); }
        function headers() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

        async function apiFetch(url, opts = {}) {
            const res = await fetch(API + url, { ...opts, headers: headers() });
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        const COLORS = ['#22d3ee', '#818cf8', '#4ade80', '#fbbf24', '#f87171', '#fb923c', '#a78bfa'];

        async function loadGoals() {
            const d = await apiFetch('/savings');
            if (!d) return;
            const container = document.getElementById('goals-container');

            const goals = d.goals || [];
            document.getElementById('total-goals').textContent = goals.length;
            document.getElementById('completed-goals').textContent = goals.filter(g => g.is_completed).length;
            document.getElementById('total-saved').textContent = fmt(goals.reduce((s, g) => s + parseFloat(g.current_amount || 0), 0));

            if (!goals.length) {
                container.innerHTML = '<div class="panel"><div class="empty">No savings goals yet.<br>Click "+ New Goal" to create one.</div></div>';
                return;
            }

            container.innerHTML = '<div class="goals-grid">' + goals.map((g, i) => {
                const pct = Math.min(g.target_amount > 0 ? (g.current_amount / g.target_amount) * 100 : 0, 100);
                const color = COLORS[i % COLORS.length];
                const dateStr = g.target_date ? new Date(g.target_date).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
                return `<div class="goal-card${g.is_completed ? ' completed' : ''}">
      <div class="goal-card-header">
        <div>
          <div class="goal-card-title" style="color:${color}">${g.name}</div>
          ${dateStr ? `<div class="goal-card-date">Target: ${dateStr}</div>` : ''}
        </div>
        ${g.is_completed ? '<span class="completed-badge">✓ Done</span>' : ''}
      </div>
      <div class="goal-amounts">
        <div>
          <div class="saved">${fmt(g.current_amount)}</div>
          <div class="target">of ${fmt(g.target_amount)}</div>
        </div>
        <div style="text-align:right;font-size:13px;color:var(--muted);padding-top:4px">
          ${fmt(g.target_amount - g.current_amount)} to go
        </div>
      </div>
      <div class="bar-wrap"><div class="bar-fill${g.is_completed ? ' done' : ''}" style="width:${pct}%"></div></div>
      <div class="goal-footer">
        <div class="goal-pct">${Math.round(pct)}% saved</div>
        <div class="goal-actions">
          ${!g.is_completed ? `<button class="btn-contribute" onclick="openContribute(${g.id})">+ Add Money</button>` : ''}
          <button class="delete-btn" onclick="deleteGoal(${g.id})">✕</button>
        </div>
      </div>
    </div>`;
            }).join('') + '</div>';
        }

        function openModal(type) { document.getElementById('modal-' + type).classList.add('open'); }
        function closeModal(type) { document.getElementById('modal-' + type).classList.remove('open'); }

        document.querySelectorAll('.modal-overlay').forEach(el => {
            el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
        });

        async function addGoal() {
            const name = document.getElementById('goal-name').value.trim();
            const target = document.getElementById('goal-target').value;
            if (!name || !target) { alert('Please fill in name and target amount.'); return; }
            const body = {
                name,
                target_amount: target,
                current_amount: document.getElementById('goal-current').value || 0,
                target_date: document.getElementById('goal-date').value || null,
            };
            const d = await apiFetch('/savings', { method: 'POST', body: JSON.stringify(body) });
            if (d?.message) {
                closeModal('goal');
                document.getElementById('goal-name').value = '';
                document.getElementById('goal-target').value = '';
                document.getElementById('goal-current').value = '';
                document.getElementById('goal-date').value = '';
                loadGoals();
            } else alert(d?.error || 'Failed to create goal');
        }

        function openContribute(id) {
            activeGoalId = id;
            document.getElementById('contribute-amount').value = '';
            openModal('contribute');
        }

        async function contribute() {
            const amount = document.getElementById('contribute-amount').value;
            if (!amount || amount <= 0) { alert('Please enter a valid amount.'); return; }
            const d = await apiFetch(`/savings/${activeGoalId}/contribute`, { method: 'PATCH', body: JSON.stringify({ amount }) });
            if (d?.message) { closeModal('contribute'); loadGoals(); }
            else alert(d?.error || 'Failed to add money');
        }

        async function deleteGoal(id) {
            if (!confirm('Delete this savings goal?')) return;
            const d = await apiFetch('/savings/' + id, { method: 'DELETE' });
            if (d?.message) loadGoals();
            else alert(d?.error || 'Failed to delete');
        }

        function logout() {
            localStorage.removeItem('pw_token');
            localStorage.removeItem('pw_user');
            window.location.href = 'index.html';
        }

        loadGoals();
    </script>
</body>

</html>
