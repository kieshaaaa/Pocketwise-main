<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PocketWise – Budgets</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2235;
            --surface3: #1e2d42;
            --border: #1e2d42;
            --accent: #22d3ee;
            --accent2: #818cf8;
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --orange: #fb923c;
            --text: #f1f5f9;
            --muted: #64748b;
            --muted2: #94a3b8;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 50;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-text {
            font-family: 'Syne', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -.3px;
        }

        .logo-text span {
            color: var(--accent);
        }

        nav {
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            color: var(--muted2);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            transition: all .2s;
            cursor: pointer;
        }

        .nav-link:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link.active {
            background: rgba(34, 211, 238, .1);
            color: var(--accent);
        }

        .nav-link .icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .user-pill {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #0a0e1a;
            flex-shrink: 0;
        }

        .user-info {
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            margin-top: 2px;
            text-align: left;
        }

        .logout-btn:hover {
            color: var(--red);
        }

        .main {
            margin-left: 220px;
            padding: 32px;
            flex: 1;
            max-width: calc(100vw - 220px);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
        }

        .month-nav {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .month-btn {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
        }

        .month-btn:hover {
            border-color: var(--accent);
        }

        #month-label {
            font-size: 14px;
            font-weight: 600;
            min-width: 120px;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Summary row */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: .5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
        }

        .stat-value.green {
            color: var(--green);
        }

        .stat-value.red {
            color: var(--red);
        }

        .stat-value.accent {
            color: var(--accent);
        }

        /* Budget grid */
        .budget-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }

        .budget-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .budget-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .budget-card-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            font-weight: 600;
        }

        .budget-card-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .budget-amounts {
            font-size: 13px;
            color: var(--muted);
        }

        .budget-amounts strong {
            color: var(--text);
        }

        .bar-wrap {
            height: 8px;
            background: var(--surface3);
            border-radius: 99px;
            overflow: hidden;
            margin: 12px 0 10px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width .6s ease;
        }

        .budget-footer {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .delete-btn:hover {
            color: var(--red);
            background: rgba(248, 113, 113, .1);
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            padding: 40px 0;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            width: 460px;
            max-width: 95vw;
        }

        .modal-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            letter-spacing: .5px;
            text-transform: uppercase;
        }

        input,
        select {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        input:focus,
        select:focus {
            border-color: var(--accent);
        }

        select option {
            background: var(--surface2);
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted2);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
        }

        .btn-confirm {
            flex: 2;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0a0e1a;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">💰</div>
                <div class="logo-text">Pocket<span>Wise</span></div>
            </div>
            <nav>
                <a class="nav-link" href="dashboard.html"><span class="icon">📊</span> Dashboard</a>
                <a class="nav-link" href="dashboard.html" onclick="localStorage.setItem('openTxn','1')"><span
                        class="icon">➕</span> Add Transaction</a>
                <a class="nav-link active" href="budgets.html"><span class="icon">🎯</span> Budgets</a>
                <a class="nav-link" href="savings.html"><span class="icon">💎</span> Savings Goals</a>
            </nav>
            <div class="user-pill">
                <div class="avatar" id="user-avatar">?</div>
                <div class="user-info">
                    <div class="user-name" id="sidebar-name">Loading...</div>
                    <button class="logout-btn" onclick="logout()">Sign out</button>
                </div>
            </div>
        </aside>

        <main class="main">
            <div class="page-header">
                <div class="page-title">Budgets</div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="month-nav">
                        <button class="month-btn" onclick="changeMonth(-1)">←</button>
                        <div id="month-label"></div>
                        <button class="month-btn" onclick="changeMonth(1)">→</button>
                    </div>
                    <button class="btn-primary" onclick="openModal()">+ Set Budget</button>
                </div>
            </div>

            <!-- Summary -->
            <div class="summary-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Budgeted</div>
                    <div class="stat-value accent" id="total-budgeted">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Spent</div>
                    <div class="stat-value red" id="total-spent">₹0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Remaining</div>
                    <div class="stat-value green" id="total-remaining">₹0</div>
                </div>
            </div>

            <!-- Budget Cards -->
            <div id="budget-grid">
                <div class="panel">
                    <div class="empty">No budgets set for this month</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Set Budget Modal -->
    <div class="modal-overlay" id="modal-budget">
        <div class="modal">
            <div class="modal-title">Set Budget</div>
            <div class="form-group">
                <label>Category</label>
                <select id="budget-category"></select>
            </div>
            <div class="form-group">
                <label>Monthly Limit (₹)</label>
                <input type="number" id="budget-amount" placeholder="0.00" min="0" />
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" onclick="setBudget()">Set Budget</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://pocketwise-production.up.railway.app/api';
        const token = localStorage.getItem('pw_token');
        const user = JSON.parse(localStorage.getItem('pw_user') || '{}');
        if (!token) window.location.href = 'index.html';

        document.getElementById('sidebar-name').textContent = user.name || 'User';
        document.getElementById('user-avatar').textContent = (user.name || 'U')[0].toUpperCase();

        let currentDate = new Date();

        function fmt(n) { return '₹' + parseFloat(n || 0).toLocaleString('en-IN', { minimumFractionDigits: 0 }); }
        function headers() { return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }; }

        async function apiFetch(url, opts = {}) {
            const res = await fetch(API + url, { ...opts, headers: headers() });
            if (res.status === 401) { logout(); return null; }
            return res.json();
        }

        function updateMonthLabel() {
            const names = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('month-label').textContent = names[currentDate.getMonth()] + ' ' + currentDate.getFullYear();
        }

        function changeMonth(dir) {
            currentDate.setMonth(currentDate.getMonth() + dir);
            updateMonthLabel(); loadBudgets();
        }

        async function loadBudgets() {
            const d = await apiFetch(`/budgets?month=${currentDate.getMonth() + 1}&year=${currentDate.getFullYear()}`);
            if (!d) return;
            const grid = document.getElementById('budget-grid');

            if (!d.budgets || !d.budgets.length) {
                grid.innerHTML = '<div class="panel"><div class="empty">No budgets set for this month.<br>Click "+ Set Budget" to add one.</div></div>';
                document.getElementById('total-budgeted').textContent = fmt(0);
                document.getElementById('total-spent').textContent = fmt(0);
                document.getElementById('total-remaining').textContent = fmt(0);
                return;
            }

            let totalBudget = 0, totalSpent = 0;
            grid.innerHTML = '<div class="budget-grid">' + d.budgets.map(b => {
                const pct = Math.min(b.amount > 0 ? (b.actual_spent / b.amount) * 100 : 0, 100);
                const color = pct > 90 ? 'var(--red)' : pct > 70 ? 'var(--yellow)' : 'var(--green)';
                const remaining = b.amount - b.actual_spent;
                totalBudget += parseFloat(b.amount);
                totalSpent += parseFloat(b.actual_spent);
                return `<div class="budget-card">
      <div class="budget-card-header">
        <div class="budget-card-name">
          <div class="budget-card-icon" style="background:${b.color}22">${b.icon || '📦'}</div>
          ${b.category_name}
        </div>
        <button class="delete-btn" onclick="deleteBudget(${b.budget_id})">✕</button>
      </div>
      <div class="budget-amounts"><strong>${fmt(b.actual_spent)}</strong> spent of ${fmt(b.amount)}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="budget-footer">
        <span>${Math.round(pct)}% used</span>
        <span style="color:${remaining >= 0 ? 'var(--green)' : 'var(--red)'}">${remaining >= 0 ? '₹' + Math.abs(remaining).toLocaleString('en-IN') + ' left' : '₹' + Math.abs(remaining).toLocaleString('en-IN') + ' over'}</span>
      </div>
    </div>`;
            }).join('') + '</div>';

            document.getElementById('total-budgeted').textContent = fmt(totalBudget);
            document.getElementById('total-spent').textContent = fmt(totalSpent);
            const rem = totalBudget - totalSpent;
            const remEl = document.getElementById('total-remaining');
            remEl.textContent = fmt(Math.abs(rem));
            remEl.className = 'stat-value ' + (rem >= 0 ? 'green' : 'red');
        }

        async function loadCategories() {
            const d = await apiFetch('/categories');
            if (!d) return;
            document.getElementById('budget-category').innerHTML =
                d.categories.map(c => `<option value="${c.category_id}">${c.icon} ${c.name}</option>`).join('');
        }

        function openModal() { loadCategories(); document.getElementById('modal-budget').classList.add('open'); }
        function closeModal() { document.getElementById('modal-budget').classList.remove('open'); }
        document.getElementById('modal-budget').addEventListener('click', e => { if (e.target === document.getElementById('modal-budget')) closeModal(); });

        async function setBudget() {
            const body = {
                category_id: document.getElementById('budget-category').value,
                amount: document.getElementById('budget-amount').value,
                month: currentDate.getMonth() + 1,
                year: currentDate.getFullYear(),
            };
            if (!body.amount || body.amount <= 0) { alert('Please enter a valid amount.'); return; }
            const d = await apiFetch('/budgets', { method: 'POST', body: JSON.stringify(body) });
            if (d?.message) { closeModal(); document.getElementById('budget-amount').value = ''; loadBudgets(); }
            else alert(d?.error || 'Failed to set budget');
        }

        async function deleteBudget(id) {
            if (!confirm('Delete this budget?')) return;
            const d = await apiFetch('/budgets/' + id, { method: 'DELETE' });
            if (d?.message) loadBudgets();
            else alert(d?.error || 'Failed to delete');
        }

        function logout() {
            localStorage.removeItem('pw_token');
            localStorage.removeItem('pw_user');
            window.location.href = 'index.html';
        }

        updateMonthLabel();
        loadBudgets();
    </script>
</body>

</html>
